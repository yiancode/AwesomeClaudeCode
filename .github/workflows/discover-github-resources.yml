name: Discover GitHub Resources

on:
  schedule:
    # 每天 UTC 2:00 运行 Topics 发现
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      discovery_type:
        description: 'Discovery type to run'
        required: true
        default: 'topics'
        type: choice
        options:
          - topics
          - related
          - trends
          - all
      limit:
        description: 'Maximum resources to discover'
        required: false
        default: '10'
        type: string
      dry_run:
        description: 'Dry run (do not modify files)'
        required: false
        default: false
        type: boolean

jobs:
  discover-topics:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.discovery_type == 'topics' || github.event.inputs.discovery_type == 'all'))

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover by Topics
        id: discover
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          DRY_RUN="${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}"

          python scripts/discover_github_topics.py --limit $LIMIT $DRY_RUN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANG: zh_CN.UTF-8
          LC_ALL: zh_CN.UTF-8

      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet candidates/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.verify_diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/
          git commit -m "feat: 自动发现新资源 (Topics) [skip ci]"
          git push

      - name: Create summary Issue
        if: steps.verify_diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];

            const issueBody = [
              '## 📦 新发现的候选资源',
              '',
              '本次通过 **GitHub Topics** 搜索发现了新的候选资源。',
              '',
              '### 后续步骤',
              '1. 查看 `candidates/pending_resources.json` 中的新资源',
              '2. 使用 `python scripts/create_resource_pr.py --list` 查看待审核列表',
              '3. 审核通过后运行 `python scripts/create_resource_pr.py --all` 创建 PR',
              '',
              '---',
              '🤖 由 GitHub 资源发现工作流自动生成'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 自动发现的新资源 - ${date}`,
              body: issueBody,
              labels: ['auto-discovered', 'needs-review']
            });

  discover-related:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.discovery_type == 'related' || github.event.inputs.discovery_type == 'all')

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover related repos
        id: discover
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          DRY_RUN="${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}"

          python scripts/discover_related_repos.py --limit $LIMIT $DRY_RUN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANG: zh_CN.UTF-8
          LC_ALL: zh_CN.UTF-8

      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet candidates/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.verify_diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/
          git commit -m "feat: 自动发现关联项目 [skip ci]"
          git push

  analyze-trends:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.discovery_type == 'trends' || github.event.inputs.discovery_type == 'all')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analyze trends
        id: analyze
        run: |
          LIMIT="${{ github.event.inputs.limit || '50' }}"

          python scripts/analyze_github_trends.py \
            --report \
            --update-history \
            --limit $LIMIT \
            --output trends_report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANG: zh_CN.UTF-8
          LC_ALL: zh_CN.UTF-8

      - name: Upload trends report
        uses: actions/upload-artifact@v6
        with:
          name: trends-report
          path: trends_report.md
          retention-days: 30

      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet candidates/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit history updates
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/trends_history.json
          git commit -m "chore: 更新趋势历史数据 [skip ci]" || true
          git push

  # 每周运行一次完整分析
  weekly-full-analysis:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * 0'  # 每周日 UTC 2:00

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full discovery
        run: |
          echo "🔍 Running Topics discovery..."
          python scripts/discover_github_topics.py --limit 20

          echo "🔗 Running Related discovery..."
          python scripts/discover_related_repos.py --limit 10

          echo "📈 Running Trends analysis..."
          python scripts/analyze_github_trends.py --report --update-history --output trends_report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANG: zh_CN.UTF-8
          LC_ALL: zh_CN.UTF-8

      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet candidates/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit all changes
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/
          git commit -m "feat: 每周资源自动发现与趋势分析 [skip ci]"
          git push

      - name: Create weekly summary Issue
        if: steps.verify_diff.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];

            let trendsReport = '';
            try {
              trendsReport = fs.readFileSync('trends_report.md', 'utf8');
            } catch (e) {
              trendsReport = '*趋势报告生成失败*';
            }

            const issueBody = [
              '## 🔍 每周自动发现摘要',
              '',
              '本周通过自动化流程发现了新的候选资源。',
              '',
              '### 发现来源',
              '- GitHub Topics 搜索',
              '- 关联项目分析',
              '- 趋势分析',
              '',
              '### 趋势报告',
              '',
              trendsReport.substring(0, 60000),
              '',
              '### 后续步骤',
              '1. 查看 `candidates/pending_resources.json`',
              '2. 审核新发现的资源',
              '3. 批准优质资源',
              '',
              '---',
              '🤖 每周自动生成'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 每周资源发现报告 - ${date}`,
              body: issueBody,
              labels: ['auto-discovered', 'weekly-report', 'needs-review']
            });
