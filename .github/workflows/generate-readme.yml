name: Generate README

on:
  push:
    branches:
      - main
    paths:
      - 'THE_RESOURCES_TABLE.csv'
      - 'templates/**'
      - 'scripts/generate_readme.py'
      - 'candidates/**'  # 爬虫更新候选资源时也触发
  pull_request:
    paths:
      - 'THE_RESOURCES_TABLE.csv'
      - 'templates/**'
      - 'scripts/generate_readme.py'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate README
        run: |
          python3 scripts/generate_readme.py
        env:
          LANG: zh_CN.UTF-8
          LC_ALL: zh_CN.UTF-8

      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: 自动生成 README [skip ci]"

          # 推送前先拉取最新变更，避免冲突
          # Pull latest changes before pushing to avoid conflicts
          echo "拉取最新变更..."
          git pull --rebase origin ${{ github.ref_name }} || git pull --rebase origin main

          # 推送变更，最多重试 3 次
          # Push changes with up to 3 retries
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "尝试推送 (第 $((RETRY_COUNT + 1)) 次)..."
            if git push origin ${{ github.ref_name }} || git push origin HEAD:main; then
              echo "✅ 推送成功"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 推送失败，等待 5 秒后重试..."
                sleep 5
                echo "拉取最新变更..."
                git pull --rebase origin ${{ github.ref_name }} || git pull --rebase origin main
              fi
            fi
          done

          echo "❌ 推送失败，已重试 $MAX_RETRIES 次"
          exit 1

      - name: Comment on PR
        if: steps.verify_diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ README.md 已自动更新\n\n📊 资源统计已刷新，请查看最新的 README.md'
            })
