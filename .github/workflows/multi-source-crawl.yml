name: Multi-source Resource Crawl

on:
  schedule:
    # 每周三和周六 UTC 3:00 运行
    - cron: '0 3 * * 3,6'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Data sources to crawl'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - reddit
          - awesome
          - rss
          - hackernews
      limit:
        description: 'Maximum resources per source'
        required: false
        default: '10'
        type: string
      dry_run:
        description: 'Dry run (do not modify files)'
        required: false
        default: false
        type: boolean

jobs:
  crawl:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install feedparser  # RSS 解析可选依赖

      - name: Run multi-source crawl
        id: crawl
        run: |
          SOURCES="${{ github.event.inputs.sources || 'all' }}"
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          DRY_RUN="${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}"

          python scripts/multi_source_crawl.py \
            --sources $SOURCES \
            --limit $LIMIT \
            $DRY_RUN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          LANG: zh_CN.UTF-8
          LC_ALL: zh_CN.UTF-8

      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet candidates/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.verify_diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/
          git commit -m "feat: 多源资源爬取发现新资源 [skip ci]"

          # 推送前先拉取最新变更，避免冲突
          # Pull latest changes before pushing to avoid conflicts
          echo "拉取最新变更..."
          git pull --rebase origin ${{ github.ref_name }}

          # 推送变更，最多重试 3 次
          # Push changes with up to 3 retries
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "尝试推送 (第 $((RETRY_COUNT + 1)) 次)..."
            if git push origin ${{ github.ref_name }}; then
              echo "✅ 推送成功"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 推送失败，等待 5 秒后重试..."
                sleep 5
                echo "拉取最新变更..."
                git pull --rebase origin ${{ github.ref_name }}
              fi
            fi
          done

          echo "❌ 推送失败，已重试 $MAX_RETRIES 次"
          exit 1

      - name: Create summary Issue
        if: steps.verify_diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const sources = '${{ github.event.inputs.sources || 'all' }}';

            const issueBody = [
              '## 📦 多源资源爬取结果',
              '',
              '本次从以下数据源发现了新的候选资源：',
              '',
              `**数据源**: ${sources}`,
              '',
              '### 数据源说明',
              '- **Reddit**: 从 ClaudeAI、LocalLLaMA 等 subreddit 搜索',
              '- **Awesome Lists**: 从 awesome-mcp-servers 等列表提取',
              '- **RSS**: 从 Anthropic Blog、HN RSS 等订阅源获取',
              '- **Hacker News**: 通过 Algolia API 搜索',
              '',
              '### 后续步骤',
              '1. 查看 `candidates/pending_resources.json`',
              '2. 运行 `python scripts/create_resource_pr.py --list` 查看待审核',
              '3. 审核通过后运行 `python scripts/create_resource_pr.py --all` 创建 PR',
              '',
              '---',
              '🤖 由多源爬取工作流自动生成'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🕸️ 多源爬取发现新资源 - ${date}`,
              body: issueBody,
              labels: ['auto-discovered', 'multi-source', 'needs-review']
            });

  # 单独运行各爬虫的作业（用于调试）
  crawl-reddit:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.sources == 'reddit'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl Reddit
        run: |
          python scripts/multi_source_crawl.py \
            --sources reddit \
            --limit ${{ github.event.inputs.limit || '10' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

      - name: Commit and push changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "没有变更需要提交"
            exit 0
          fi

          git commit -m "feat: Reddit 爬取发现新资源 [skip ci]"

          # 推送前先拉取最新变更
          echo "拉取最新变更..."
          git pull --rebase origin ${{ github.ref_name }} || exit 0

          # 推送变更，最多重试 3 次
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "尝试推送 (第 $((RETRY_COUNT + 1)) 次)..."
            if git push origin ${{ github.ref_name }}; then
              echo "✅ 推送成功"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 推送失败，等待 5 秒后重试..."
                sleep 5
                git pull --rebase origin ${{ github.ref_name }} || exit 0
              fi
            fi
          done

          echo "⚠️ 推送失败，已重试 $MAX_RETRIES 次（非关键错误）"
          exit 0  # 不影响整体 workflow

  crawl-hackernews:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.sources == 'hackernews'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl Hacker News
        run: |
          python scripts/multi_source_crawl.py \
            --sources hackernews \
            --limit ${{ github.event.inputs.limit || '10' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit and push changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "没有变更需要提交"
            exit 0
          fi

          git commit -m "feat: Hacker News 爬取发现新资源 [skip ci]"

          # 推送前先拉取最新变更
          echo "拉取最新变更..."
          git pull --rebase origin ${{ github.ref_name }} || exit 0

          # 推送变更，最多重试 3 次
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "尝试推送 (第 $((RETRY_COUNT + 1)) 次)..."
            if git push origin ${{ github.ref_name }}; then
              echo "✅ 推送成功"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 推送失败，等待 5 秒后重试..."
                sleep 5
                git pull --rebase origin ${{ github.ref_name }} || exit 0
              fi
            fi
          done

          echo "⚠️ 推送失败，已重试 $MAX_RETRIES 次（非关键错误）"
          exit 0  # 不影响整体 workflow
