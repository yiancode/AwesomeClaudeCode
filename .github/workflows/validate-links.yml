name: Validate Links

on:
  schedule:
    # 每周一 UTC 0:00 (北京时间周一 8:00) 运行
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 允许手动触发
  pull_request:
    paths:
      - 'THE_RESOURCES_TABLE.csv'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate links
        id: validate
        run: |
          python3 scripts/validate_links.py > validation_report.txt 2>&1
          echo "report_path=validation_report.txt" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check validation results
        id: check_results
        run: |
          if [ -f validation_report.txt ]; then
            # 检查是否有新失效链接或总失效链接数大于 0
            if grep -q "Newly broken links: [1-9]" validation_report.txt || grep -q "Total broken links: [1-9]" validation_report.txt; then
              echo "has_failures=true" >> $GITHUB_OUTPUT
            else
              echo "has_failures=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: validation-report
          path: validation_report.txt
          retention-days: 30

      - name: Create issue for broken links
        if: steps.check_results.outputs.has_failures == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('validation_report.txt', 'utf8');

            const title = `🔗 链接验证失败 / Link Validation Failed - ${new Date().toISOString().split('T')[0]}`;

            const bodyParts = [
              '## 链接验证报告 / Link Validation Report',
              '',
              '⚠️ 检测到失败的链接。请查看详细报告并更新或移除失败的资源。',
              '',
              '<details>',
              '<summary>📋 完整报告 / Full Report</summary>',
              '',
              '```',
              report,
              '```',
              '',
              '</details>',
              '',
              '### 处理步骤 / Action Items',
              '',
              '1. 检查失败的 URL 是否真的无法访问',
              '2. 如果资源已永久下线，从 CSV 中移除',
              '3. 如果是暂时性错误，可以在 `templates/resource-overrides.yaml` 中添加 `skip_validation: true`',
              '4. 更新后运行 `make generate` 重新生成 README'
            ];
            const body = bodyParts.join('\n');

            // 查找是否已有未关闭的验证失败 Issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links'
            });

            if (issues.data.length === 0) {
              // 创建新 Issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['broken-links', 'automated']
              });
            } else {
              // 更新现有 Issue
              const commentBody = `## 🔄 最新验证报告 / Latest Report - ${new Date().toISOString().split('T')[0]}\n\n${body}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: commentBody
              });
            }

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('validation_report.txt', 'utf8');
            const hasFailures = ${{ steps.check_results.outputs.has_failures }};

            let emoji = hasFailures ? '⚠️' : '✅';
            let status = hasFailures ? '发现失败的链接' : '所有链接验证通过';

            const commentBody = [
              `${emoji} **链接验证结果**: ${status}`,
              '',
              '<details>',
              '<summary>查看详细报告</summary>',
              '',
              '```',
              report.slice(0, 5000),
              '```',
              '',
              '</details>'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
